services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aiml-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD no definido en .env}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - aiml-net
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aiml-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SA_PASSWORD=${SQL_SA_PASSWORD}
    volumes:
      - ${HOST_PROJECT_DIR:-.}/db/init.sql:/init.sql
    networks:
      - aiml-net
    entrypoint: ["sh", "-c", "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$$SA_PASSWORD\" -C -i /init.sql"]
    restart: "no"

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: aiml-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AIml;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET no definido en .env}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
    networks:
      - aiml-net
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./src/Web
      dockerfile: Dockerfile
    container_name: aiml-web
    ports:
      - "9090:80"
    volumes:
      - ${HOST_PROJECT_DIR:-.}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aiml-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  aiml-net:
    driver: bridge

volumes:
  sqlserver_data:
