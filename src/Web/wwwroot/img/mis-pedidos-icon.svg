<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado iOS-like (radius 220 = ~22% que es estandar Apple) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" />

  <!-- Decoracion: lineas onduladas sutiles abajo, dan idea de movimiento/asfalto -->
  <path d="M -50 880 Q 256 820, 512 880 T 1074 880" stroke="rgba(255,255,255,0.10)" stroke-width="20" fill="none" stroke-linecap="round" />
  <path d="M -50 940 Q 256 880, 512 940 T 1074 940" stroke="rgba(255,255,255,0.07)" stroke-width="14" fill="none" stroke-linecap="round" />

  <!-- La camioneta REAL — embebida del PNG. Ocupa el 88% central para que se vea LO MAS POSIBLE -->
  <image x="62" y="62" width="900" height="900" xlink:href="zanella-raw.png" filter="url(#dropShadow)" preserveAspectRatio="xMidYMid meet" />
</svg>
