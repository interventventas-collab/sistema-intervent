<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo redondeado con gradiente -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="truckBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Camioneta -->
  <g transform="translate(60,160)">
    <!-- Caja de carga (parte trasera, mas alta) -->
    <rect x="0" y="20" width="240" height="140" rx="8" fill="url(#truckBody)" stroke="#0c4a6e" stroke-width="4"/>
    <!-- Detalle linea de la caja -->
    <line x1="0" y1="90" x2="240" y2="90" stroke="#0c4a6e" stroke-width="3" opacity="0.6"/>
    <!-- Cabina (a la derecha, mas baja, con techo inclinado) -->
    <path d="M 240,55 L 280,55 L 320,90 L 320,160 L 240,160 Z" fill="url(#truckBody)" stroke="#0c4a6e" stroke-width="4"/>
    <!-- Ventana cabina -->
    <path d="M 250,65 L 277,65 L 305,92 L 250,92 Z" fill="#7dd3fc" stroke="#0c4a6e" stroke-width="3"/>
    <!-- Ruedas -->
    <circle cx="60" cy="170" r="28" fill="#1f2937" stroke="#111827" stroke-width="3"/>
    <circle cx="60" cy="170" r="12" fill="#9ca3af"/>
    <circle cx="270" cy="170" r="28" fill="#1f2937" stroke="#111827" stroke-width="3"/>
    <circle cx="270" cy="170" r="12" fill="#9ca3af"/>
    <!-- Faro delantero -->
    <rect x="315" y="125" width="8" height="14" rx="2" fill="#fde047"/>
    <!-- Box con icono check en la caja -->
    <g transform="translate(85,55)">
      <rect x="0" y="0" width="70" height="50" rx="4" fill="#fef3c7" stroke="#92400e" stroke-width="3"/>
      <path d="M 18,25 L 30,37 L 52,15" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Texto "MIS PEDIDOS" -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="62" fill="#ffffff" letter-spacing="2">MIS PEDIDOS</text>

  <!-- Texto pequeño abajo -->
  <text x="256" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#e0f2fe" opacity="0.85">FRIKAF · Repartidor</text>
</svg>
