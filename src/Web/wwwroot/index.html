<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Marca - Dashboard</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;">
            <p style="color:#64748b;font-family:Inter,sans-serif;">Cargando...</p>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.copyToClipboard = function(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            return Promise.resolve();
        };
    </script>
    <script>
        window.applyBrandColors = function(primaryColor, sidebarBgColor) {
            var root = document.documentElement.style;

            if (primaryColor) {
                root.setProperty('--primary', primaryColor);
                // Derive colors
                var r = parseInt(primaryColor.slice(1,3), 16);
                var g = parseInt(primaryColor.slice(3,5), 16);
                var b = parseInt(primaryColor.slice(5,7), 16);
                // Darker
                root.setProperty('--primary-dark', '#' + Math.max(0,r-30).toString(16).padStart(2,'0') + Math.max(0,g-30).toString(16).padStart(2,'0') + Math.max(0,b-30).toString(16).padStart(2,'0'));
                // Lighter
                root.setProperty('--primary-light', '#' + Math.min(255,r+30).toString(16).padStart(2,'0') + Math.min(255,g+30).toString(16).padStart(2,'0') + Math.min(255,b+30).toString(16).padStart(2,'0'));
                // Background
                root.setProperty('--primary-bg', 'rgba(' + r + ',' + g + ',' + b + ',0.1)');
            }

            if (sidebarBgColor) {
                root.setProperty('--sidebar-bg', sidebarBgColor);
                var r2 = parseInt(sidebarBgColor.slice(1,3), 16);
                var g2 = parseInt(sidebarBgColor.slice(3,5), 16);
                var b2 = parseInt(sidebarBgColor.slice(5,7), 16);
                root.setProperty('--sidebar-hover', '#' + Math.min(255,r2+15).toString(16).padStart(2,'0') + Math.min(255,g2+15).toString(16).padStart(2,'0') + Math.min(255,b2+15).toString(16).padStart(2,'0'));
                root.setProperty('--sidebar-active', '#' + Math.min(255,r2+25).toString(16).padStart(2,'0') + Math.min(255,g2+25).toString(16).padStart(2,'0') + Math.min(255,b2+25).toString(16).padStart(2,'0'));
            }
        };

        window.filesDragDrop = (function() {
            var map = new WeakMap();
            var currentUpload = null; // { controller, cancelled }
            // El JWT viaja en una cookie httpOnly que el browser envia automaticamente
            // con credentials:'same-origin'. Ya no hay que leer el token desde JS.
            async function upload(el, ref, fileList) {
                if (!fileList || fileList.length === 0) return;
                var files = Array.from(fileList);
                var path = '';
                try { path = await ref.invokeMethodAsync('GetCurrentPath'); } catch {}
                var names = files.map(function(f) { return f.webkitRelativePath || f.name; });
                try { await ref.invokeMethodAsync('OnUploadStart', names); } catch {}
                var ok = 0, fail = 0;
                currentUpload = { controller: new AbortController(), cancelled: false };
                var upload = currentUpload;
                for (var i = 0; i < files.length; i++) {
                    if (upload.cancelled) {
                        for (var j = i; j < files.length; j++) {
                            try { await ref.invokeMethodAsync('OnUploadFileDone', j, false, 'Cancelado'); } catch {}
                            fail++;
                        }
                        break;
                    }
                    try { await ref.invokeMethodAsync('OnUploadFileStart', i); } catch {}
                    var fd = new FormData();
                    fd.append('files', files[i], names[i]);
                    var success = false, errMsg = null;
                    try {
                        var res = await fetch('/api/files/upload?path=' + encodeURIComponent(path), {
                            method: 'POST',
                            credentials: 'same-origin',
                            body: fd,
                            signal: upload.controller.signal
                        });
                        if (res.ok) {
                            var body = await res.json().catch(function(){ return null; });
                            var r = Array.isArray(body) ? body[0] : null;
                            success = !!(r && r.success);
                            if (!success) errMsg = (r && r.error) || 'Error';
                        } else {
                            errMsg = 'HTTP ' + res.status;
                        }
                    } catch (ex) {
                        errMsg = (ex && ex.name === 'AbortError') ? 'Cancelado' : (ex.message || 'Error');
                    }
                    if (success) ok++; else fail++;
                    try { await ref.invokeMethodAsync('OnUploadFileDone', i, success, errMsg); } catch {}
                }
                currentUpload = null;
                try { await ref.invokeMethodAsync('OnUploadComplete', ok, fail); } catch {}
            }
            return {
                init: function(el, ref) {
                    if (!el) return;
                    var handlers = {
                        dragenter: function(e) { e.preventDefault(); e.stopPropagation(); try { ref.invokeMethodAsync('OnDragStateChanged', true); } catch {} },
                        dragover: function(e) { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = 'copy'; },
                        dragleave: function(e) {
                            e.preventDefault(); e.stopPropagation();
                            if (!el.contains(e.relatedTarget)) { try { ref.invokeMethodAsync('OnDragStateChanged', false); } catch {} }
                        },
                        drop: function(e) {
                            e.preventDefault(); e.stopPropagation();
                            try { ref.invokeMethodAsync('OnDragStateChanged', false); } catch {}
                            upload(el, ref, e.dataTransfer.files);
                        }
                    };
                    Object.keys(handlers).forEach(function(k) { el.addEventListener(k, handlers[k]); });
                    map.set(el, handlers);
                },
                dispose: function(el) {
                    if (!el) return;
                    var h = map.get(el); if (!h) return;
                    Object.keys(h).forEach(function(k) { el.removeEventListener(k, h[k]); });
                    map.delete(el);
                },
                cancel: function() {
                    if (currentUpload) {
                        currentUpload.cancelled = true;
                        try { currentUpload.controller.abort(); } catch {}
                    }
                }
            };
        })();

        window.downloadTextFile = function(filename, content, mimeType) {
            var blob = new Blob([content], { type: mimeType || 'text/plain' });
            var href = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = href; a.download = filename || 'archivo.txt';
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(function() { URL.revokeObjectURL(href); }, 1000);
        };

        window.filesDownload = {
            start: async function(url, filename) {
                // El JWT viaja en cookie httpOnly: con credentials:'same-origin'
                // el browser la incluye automaticamente.
                var res = await fetch(url, { credentials: 'same-origin' });
                if (!res.ok) { alert('No se pudo descargar: ' + res.status); return; }
                var blob = await res.blob();
                var href = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = href; a.download = filename || 'archivo';
                document.body.appendChild(a); a.click(); a.remove();
                setTimeout(function() { URL.revokeObjectURL(href); }, 1000);
            }
        };

        window.updatePageTitle = function(brandName) {
            var pageName = '';
            var path = window.location.pathname.replace(/^\//, '').split('?')[0];
            var titles = {
                '': 'Dashboard', 'publicaciones': 'Publicaciones', 'ordenes': 'Ordenes',
                'productos': 'Productos', 'productos-base': 'Productos base', 'combos': 'Combos',
                'usuarios': 'Usuarios', 'roles': 'Roles',
                'integraciones': 'Integraciones', 'procesos': 'Procesos',
                'auditoria': 'Auditoria', 'config': 'Configuracion', 'perfil': 'Perfil'
            };
            pageName = titles[path] || 'Dashboard';
            document.title = brandName + ' - ' + pageName;
        };
    </script>
</body>
</html>
