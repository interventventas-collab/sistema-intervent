server {
    listen 80;
    server_name localhost;

    # Resolver el scheme original del cliente: si Caddy ya seteo
    # X-Forwarded-Proto, lo respetamos. Si no, usamos nuestro $scheme.
    set $client_proto $http_x_forwarded_proto;
    if ($client_proto = "") { set $client_proto $scheme; }

    # Limite de subida (ej: archivos, importacion masiva, fotos de productos, etc).
    # Tiene que matchear con el limite del backend (2 GB en Kestrel + MultipartBodyLengthLimit).
    client_max_body_size 2G;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # App del amigo electricista (C.S.E) — sistema en la nube con su propio backend.
    # ^~ = si matchea este prefijo, no evaluar los regex de abajo (css/js/img).
    # proxy_pass con barra final = le saca el prefijo /electricista-nube antes de mandar.
    location ^~ /electricista-nube/ {
        proxy_pass http://electri-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
    }

    # SPA routing - try files, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2026-06-26: index.html es el host de la SPA. Si el navegador lo cachea, sigue
    # cargando referencias viejas y un deploy nuevo no se ve (sintoma: "QR invalido").
    # Tiene que ser siempre fresco — los assets que referencia van por hash.
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # WhatsApp endpoints can take several minutes (bulk send via Playwright)
    # ^~ = si matchea este prefijo, NO evaluar los regex de abajo (css/js/img).
    # Sin esto, un adjunto tipo /api/whatsapp/twilio/files/abc.jpg lo agarraba la regla
    # de imagenes y lo buscaba entre los archivos del sitio -> 404 (el .pdf si andaba,
    # porque no esta en esa lista). 2026-07-23.
    location ^~ /api/whatsapp/ {
        proxy_pass http://api-prod:80/api/whatsapp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # En prod estamos detras de Caddy que termina TLS. Caddy setea
        # X-Forwarded-Proto: https. Si lo pisamos con $scheme aca, la API
        # ve "http" y la cookie httpOnly no se marca como Secure.
        # Por eso propagamos el header tal como viene de Caddy, con fallback
        # a $scheme local si no estuviera (acceso directo, edge case).
        proxy_set_header X-Forwarded-Proto $client_proto;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API reverse proxy
    # ^~ tambien aca, por el mismo motivo (que ningun /api/... termine cazado por los regex).
    location ^~ /api/ {
        proxy_pass http://api-prod:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # En prod estamos detras de Caddy que termina TLS. Caddy setea
        # X-Forwarded-Proto: https. Si lo pisamos con $scheme aca, la API
        # ve "http" y la cookie httpOnly no se marca como Secure.
        # Por eso propagamos el header tal como viene de Caddy, con fallback
        # a $scheme local si no estuviera (acceso directo, edge case).
        proxy_set_header X-Forwarded-Proto $client_proto;
        proxy_cache_bypass $http_upgrade;
        # Operaciones largas (envio WhatsApp via Playwright pueden tardar varios minutos)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Blazor framework files - cache hashed assets, pero NUNCA el manifest.
    # 2026-06-25: bug — blazor.boot.json estaba cacheado 7d con immutable, asi que
    # un deploy nuevo no se veia hasta hacer Ctrl+Shift+R. El manifest tiene que ser
    # siempre fresco para que apunte a los hashes nuevos.
    location = /_framework/blazor.boot.json {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    location = /_framework/service-worker-assets.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    # 2026-06-26: blazor.webassembly.js es el loader que arranca todo y NO tiene hash en
    # el nombre — cambia en cada deploy. Antes lo agarraba el regex \.(js)$ como immutable 7d,
    # asi que un deploy nuevo no se veia hasta limpiar cache (sintoma: "QR invalido" porque la
    # app vieja no conocia la pantalla /alquiler). Lo forzamos siempre fresco.
    location = /_framework/blazor.webassembly.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location /_framework/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache CSS/JS in production
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache images, fonts, and Blazor binary assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|dll|wasm|dat)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
