server {
    listen 80;
    server_name localhost;

    # Limite de subida (ej: archivos, importacion masiva de productos en xlsx, fotos, etc).
    # El backend (Kestrel + MultipartBodyLengthLimit) ya acepta hasta 2 GB; nginx por
    # default cortaba en 1 MB y devolvia 413 Request Entity Too Large.
    client_max_body_size 2G;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - try files, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2026-06-26: archivos que arrancan la SPA y cambian en cada deploy -> siempre frescos.
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    location = /_framework/blazor.boot.json {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /_framework/blazor.webassembly.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # WhatsApp endpoints can take several minutes (bulk send via Playwright)
    location /api/whatsapp/ {
        proxy_pass http://api:80/api/whatsapp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Operaciones largas (envio WhatsApp via Playwright pueden tardar varios minutos)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Swagger proxy (development)
    location /swagger {
        proxy_pass http://api:80/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2026-07-06: en DESARROLLO servimos los binarios de Blazor SIN cache "immutable",
    # asi cada cambio se ve con un F5 simple (antes quedaban pegados 7 dias y habia que
    # limpiar cache a mano). nginx igual manda ETag: si el archivo no cambio responde 304
    # (rapido); si cambio, trae el nuevo. Ideal para el entorno de desarrollo.
    location /_framework/ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # No cache for CSS/JS during development
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache images and fonts (no cambian seguido).
    # OJO: los binarios de Blazor (.wasm/.dll/.dat) YA NO van aca — se sirven por la
    # location /_framework/ de arriba, con revalidacion, para que los cambios se vean al toque.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }


    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
